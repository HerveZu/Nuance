  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      fam:'magenta'},\n      {id:'VI', name:'Cobalt Violet',  code:'VIO-08', ryb:[0.6,0,0.8],    fam:'violet'},\n      {id:'DOX',name:'Dioxazine',      code:'DOX-09', ryb:[0.5,0,0.92],   fam:'violet'},\n      {id:'MAU',name:'Mauve',          code:'MAU-10', ryb:[0.55,0.05,0.7],fam:'violet'},\n      {id:'CDO',name:'Cadmium Orange', code:'CDO-11', ryb:[0.9,0.6,0],    fam:'orange'},\n      {id:'ORG',name:'Bright Orange',  code:'ORG-12', ryb:[1,0.45,0],     fam:'orange'},\n      {id:'Y',  name:'Naples Yellow',  code:'JNP-13', ryb:[0,1,0],        fam:'yellow'},\n      {id:'CDY',name:'Cadmium Yellow', code:'CDY-14', ryb:[0.12,1,0],     fam:'yellow'},\n      {id:'LEM',name:'Lemon Yellow',   code:'LEM-15', ryb:[0,1,0.12],     fam:'yellow'},\n      {id:'OC', name:'Yellow Ochre',   code:'OCR-16', ryb:[0.25,1,0.1],   fam:'earth'},\n      {id:'GLD',name:'Gold Ochre',     code:'GLD-17', ryb:[0.4,0.9,0.15], fam:'earth'},\n      {id:'TS', name:'Raw Sienna',     code:'TDS-18', ryb:[0.7,0.6,0.3],  fam:'earth'},\n      {id:'BSN',name:'Burnt Sienna',   code:'BSN-19', ryb:[0.85,0.4,0.2], fam:'earth'},\n      {id:'RUM',name:'Raw Umber',      code:'RUM-20', ryb:[0.6,0.6,0.5],  fam:'earth'},\n      {id:'BUM',name:'Burnt Umber',    code:'BUM-21', ryb:[0.72,0.5,0.45],fam:'earth'},\n      {id:'VR', name:'Veronese Green', code:'VER-22', ryb:[0,0.85,0.45],  fam:'green'},\n      {id:'SAP',name:'Sap Green',      code:'SAP-23', ryb:[0.1,0.8,0.55], fam:'green'},\n      {id:'OLV',name:'Olive Green',    code:'OLV-24', ryb:[0.25,0.85,0.4],fam:'green'},\n      {id:'VIR',name:'Viridian',       code:'VIR-25', ryb:[0,0.72,0.7],   fam:'green'},\n      {id:'EMR',name:'Emerald',        code:'EMR-26', ryb:[0,0.78,0.6],   fam:'green'},\n      {id:'B',  name:'Ultramarine',    code:'OUT-27', ryb:[0,0,1],        fam:'blue'},\n      {id:'COB',name:'Cobalt Blue',    code:'COB-28', ryb:[0,0.1,0.95],   fam:'blue'},\n      {id:'CE', name:'Cerulean',       code:'CER-29', ryb:[0,0.22,0.9],   fam:'blue'},\n      {id:'PRU',name:'Prussian Blue',  code:'PRU-30', ryb:[0.12,0.3,0.85],fam:'blue'},\n      {id:'CYA',name:'Cyan',           code:'CYA-31', ryb:[0,0.4,0.85],   fam:'blue'},\n      {id:'W',  name:'Titanium White', code:'BTI-32', ryb:[0,0,0],        fam:'white'},\n      {id:'K',  name:'Ivory Black',    code:'NDI-33', ryb:[1,1,1],        fam:'black'}\n    ];\n    this.pmap = {};\n    this.POOL.forEach(p => { this.pmap[p.id] = p; });\n    this.KEYS = 'abcdefghijklmnopqrstuvwxyz';\n    this.HUEWHEEL = [[29,'red'],[55,'orange'],[100,'yellow'],[125,'chartreuse'],[145,'green'],[165,'emerald'],[195,'cyan'],[230,'azure'],[265,'blue'],[300,'violet'],[330,'magenta'],[5,'rose']];\n\n    const size = this.clampSize(props.paletteSize);\n    const date = new Date();\n    const puzzle = this.dailyPuzzle(date, size);\n    const todayKey = this.dateKey(date);\n    const stats = this.loadStats();\n    let board = [], status = 'composing';\n    const daily = this.loadDaily();\n    if (daily && daily.date === todayKey && daily.size === size && Array.isArray(daily.board)) {\n      board = daily.board.map(r => ({ recipe: r, fb: this.evaluate(r, puzzle) }));\n      status = daily.status || 'composing';\n    }\n    this.state = {\n      screen: board.length ? 'play' : 'launch',\n      puzzle, composition: [], board, status, dayOffset: 0,\n      overlayOpen: false, free: false, stats, copied: false\n    };\n  }\n\n  /* ---------- day navigation ---------- */\n  currentDate(){ const d=new Date(); d.setDate(d.getDate()-this.state.dayOffset); return d; }\n  goToDay(delta){\n    const newOffset = this.state.dayOffset + delta;\n    if(newOffset < 0) return;                     // no future puzzles\n    const d=new Date(); d.setDate(d.getDate()-newOffset);\n    if(this.dayNumber(d) < 1) return;             // floor at #1\n    const size=this.clampSize(this.props.paletteSize);\n    const puzzle=this.dailyPuzzle(d, size);\n    const isToday = newOffset===0;\n    let board=[], status='composing';\n    if(isToday){\n      const daily=this.loadDaily(); const todayKey=this.dateKey(new Date());\n      if(daily && daily.date===todayKey && daily.size===size && Array.isArray(daily.board)){\n        board=daily.board.map(r=>({recipe:r, fb:this.evaluate(r,puzzle)}));\n        status=daily.status||'composing';\n      }\n    }\n    this.setState({ dayOffset:newOffset, puzzle, composition:[], board, status, free:!isToday, overlayOpen:false, copied:false, screen: board.length?'play':'launch' });\n  }\n\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (e.metaKey || e.ctrlKey || e.altKey) return;\n      const tag = (e.target && e.target.tagName) || '';\n      if (tag === 'INPUT' || tag === 'TEXTAREA') return;\n      const st = this.state;\n      if (st.overlayOpen) return;\n      if (st.screen === 'launch') { if (e.key === 'Enter') { e.preventDefault(); this.startPlay(); } return; }\n      if (st.screen !== 'play' || st.status !== 'composing') return;\n      if (e.key === 'Enter') { e.preventDefault(); this.submit(); return; }\n      if (e.key === 'Backspace') { e.preventDefault(); this.setState(s => ({ composition: s.composition.slice(0, -1) })); return; }\n      const idx = this.KEYS.indexOf(e.key.toLowerCase());\n      if (idx >= 0 && idx < st.puzzle.palette.length) { e.preventDefault(); this.addDose(st.puzzle.palette[idx]); }\n    };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount() { if (this._onKey) window.removeEventListener('keydown', this._onKey); }\n\n  componentDidUpdate(prev) {\n    if (prev.paletteSize !== this.props.paletteSize && !this.state.free) {\n      const size = this.clampSize(this.props.paletteSize);\n      const puzzle = this.dailyPuzzle(new Date(), size);\n      this.setState({ puzzle, composition: [], board: [], status: 'composing', overlayOpen: false, screen: 'launch' });\n    }\n  }\n\n  /* ---------- helpers ---------- */\n  clampSize(v){ const n = parseInt(v,10); return [5,8,12,18,25].indexOf(n)>=0 ? n : 25; }\n  clamp(x,a,b){ return Math.max(a,Math.min(b,x)); }\n  help(){ return 'standard'; }\n  dateKey(d){ const m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return d.getFullYear()+'-'+m+'-'+day; }\n  dayNumber(d){ const u=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()); return Math.floor((u-this.EPOCH)/86400000); }\n  hashDate(d){ return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); }\n\n  /* ---------- color core ---------- */\n  lerp3(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }\n  rybToRgb(r,y,b){\n    const C=this.CORNERS;\n    const c00=this.lerp3(C.i000,C.i100,r), c01=this.lerp3(C.i001,C.i101,r);\n    const c10=this.lerp3(C.i010,C.i110,r), c11=this.lerp3(C.i011,C.i111,r);\n    const c0=this.lerp3(c00,c10,y), c1=this.lerp3(c01,c11,y);\n    const o=this.lerp3(c0,c1,b);\n    return { r:o[0], g:o[1], b:o[2] };\n  }\n  mix(recipe){\n    let r=0,y=0,b=0;\n    recipe.forEach(id=>{ const c=this.pmap[id].ryb; r+=c[0]; y+=c[1]; b+=c[2]; });\n    const n=recipe.length||1;\n    return this.rybToRgb(r/n,y/n,b/n);\n  }\n  lin(c){ return c<=0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4); }\n  rgbToOklab(rgb){\n    const r=this.lin(this.clamp(rgb.r,0,1)), g=this.lin(this.clamp(rgb.g,0,1)), b=this.lin(this.clamp(rgb.b,0,1));\n    const l=0.4122214708*r+0.5363325363*g+0.0514459929*b;\n    const m=0.2119034982*r+0.6806995451*g+0.1073969566*b;\n    const s=0.0883024619*r+0.2817188376*g+0.6299787005*b;\n    const l_=Math.cbrt(l), m_=Math.cbrt(m), s_=Math.cbrt(s);\n    return {\n      L:0.2104542553*l_+0.7936177850*m_-0.0040720468*s_,\n      a:1.9779984951*l_-2.4285922050*m_+0.4505937099*s_,\n      b:0.0259040371*l_+0.7827717662*m_-0.8086757660*s_\n    };\n  }\n  oklabToOklch(o){\n    let H=Math.atan2(o.b,o.a)*180/Math.PI; if(H<0) H+=360;\n    return { L:o.L, C:Math.hypot(o.a,o.b), H };\n  }\n  deltaE(a,b){ const x=this.rgbToOklab(a), y=this.rgbToOklab(b); return Math.hypot(x.L-y.L, x.a-y.a, x.b-y.b); }\n  matchPercent(dE){ const d=this.clamp(dE/0.5,0,1); return Math.round(100*Math.pow(1-d,1.6)); }\n  hueName(H){\n    let best='red', bd=999;\n    this.HUEWHEEL.forEach(([deg,name])=>{ let dd=Math.abs(((H-deg+540)%360)-180); if(dd<bd){bd=dd;best=name;} });\n    return best;\n  }\n  css(rgb){ const r=Math.round(this.clamp(rgb.r,0,1)*255), g=Math.round(this.clamp(rgb.g,0,1)*255), b=Math.round(this.clamp(rgb.b,0,1)*255); return 'rgb('+r+','+g+','+b+')'; }\n  fgFor(rgb){ return this.rgbToOklab(rgb).L>0.62 ? '#16130F' : '#FFFFFF'; }\n\n  /* ---------- PRNG + generation ---------- */\n  mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }\n  shuffle(arr,rng){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); const tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }\n  genPalette(rng,size){\n    const ids=this.POOL.map(p=>p.id);\n    for(let n=0;n<400;n++){\n      const cand=this.shuffle(ids,rng).slice(0,size);\n      const chrom=cand.filter(id=>id!=='W'&&id!=='K');\n      const wk=cand.filter(id=>id==='W'||id==='K');\n      const fams=new Set(chrom.map(id=>this.pmap[id].fam));\n      if(chrom.length>=3 && fams.size>=2 && wk.length<=(size>6?2:1)) return cand;\n    }\n    return this.shuffle(ids,rng).slice(0,size);\n  }\n  genRecipe(rng,palette){\n    for(let n=0;n<500;n++){\n      const distinct=Math.min(rng()<0.45?2:3, palette.length);\n      const chosen=this.shuffle(palette,rng).slice(0,distinct);\n      const doses=chosen.slice();\n      while(doses.length<5) doses.push(chosen[Math.floor(rng()*chosen.length)]);\n      const target=this.mix(doses);\n      const lch=this.oklabToOklch(this.rgbToOklab(target));\n      if(lch.L>0.92 && lch.C<0.04) continue;\n      if(lch.L<0.12) continue;\n      return { recipe:doses, target };\n    }\n    const d=this.shuffle(palette,rng).slice(0,2);\n    while(d.length<5) d.push(d[0]);\n    return { recipe:d, target:this.mix(d) };\n  }\n  themeFor(palette){\n    const fams=palette.map(id=>this.pmap[id].fam);\n    const hasW=palette.includes('W'), hasK=palette.includes('K');\n    const cool=fams.filter(f=>f==='blue'||f==='green').length;\n    const warm=fams.filter(f=>f==='red'||f==='magenta'||f==='yellow'||f==='violet'||f==='earth').length;\n    if(!hasW && !hasK) return {title:'PURE PIGMENT', sub:'No white, no black today — shift hue to lighten or shade.'};\n    if(fams.includes('earth')) return {title:'THE EARTHS', sub:'Grounded, muted territory.'};\n    if(cool>=3) return {title:'COOL FRONT', sub:'Blues and greens lead the wheel.'};\n    if(warm>=3) return {title:'WARM SPECTRUM', sub:'Reds and yellows run hot.'};\n    return {title:'FULL WHEEL', sub:'A broad spread across the spectrum.'};\n  }\n  dailyPuzzle(date,size){\n    const rng=this.mulberry32(this.hashDate(date));\n    const palette=this.genPalette(rng,size);\n    const r=this.genRecipe(rng,palette);\n    return { palette, target:r.target, canonical:r.recipe, theme:this.themeFor(palette), num:this.dayNumber(date) };\n  }\n\n  /* ---------- evaluation ---------- */\n  countMap(rec){ const m={}; rec.forEach(p=>{ m[p]=(m[p]||0)+1; }); return m; }\n  evaluate(guess,puzzle){\n    const gc=this.countMap(guess), tc=this.countMap(puzzle.canonical);\n    const clues={};\n    puzzle.palette.forEach(id=>{\n      const g=gc[id]||0, t=tc[id]||0;\n      let c='none';\n      if(g===0) c='none';\n      else if(g===t) c='green';\n      else if(t>0) c='yellow';\n      else c='grey';\n      clues[id]=c;\n    });\n    const rgb=this.mix(guess);\n    const dE=this.deltaE(rgb,puzzle.target);\n    const mp=this.matchPercent(dE);\n    return { matchPercent:mp, clues, deltaE:dE, win:mp>=this.WINPCT, rgb };\n  }\n\n  /* ---------- persistence ---------- */\n  loadStats(){ try{ const s=JSON.parse(localStorage.getItem('nuance.stats')); if(s) return s; }catch(e){} return {played:0,wins:0,currentStreak:0,maxStreak:0,distribution:[0,0,0,0,0,0],lastWinDay:null}; }\n  saveStats(s){ try{ localStorage.setItem('nuance.stats',JSON.stringify(s)); }catch(e){} }\n  loadDaily(){ try{ return JSON.parse(localStorage.getItem('nuance.daily')); }catch(e){ return null; } }\n  saveDaily(board,status){ if(this.state.free) return; try{ localStorage.setItem('nuance.daily',JSON.stringify({date:this.dateKey(new Date()),size:this.clampSize(this.props.paletteSize),board:board.map(b=>b.recipe),status})); }catch(e){} }\n  recordStats(status,attempts){\n    if(this.state.free) return;\n    const s=Object.assign({},this.state.stats);\n    s.distribution = Array.isArray(s.distribution)?s.distribution.slice():[0,0,0,0,0,0];\n    s.played=(s.played||0)+1;\n    const dn=this.dayNumber(new Date());\n    if(status==='won'){\n      s.wins=(s.wins||0)+1;\n      s.distribution[attempts-1]=(s.distribution[attempts-1]||0)+1;\n      s.currentStreak = (s.lastWinDay===dn-1) ? (s.currentStreak||0)+1 : 1;\n      s.lastWinDay=dn;\n    } else {\n      s.currentStreak=0;\n    }\n    s.maxStreak=Math.max(s.maxStreak||0, s.currentStreak||0);\n    this.setState({stats:s});\n    this.saveStats(s);\n  }\n\n  /* ---------- interactions ---------- */\n  addDose(id){ if(this.state.status!=='composing') return; if(this.state.composition.length>=5) return; this.setState(s=>({composition:[...s.composition,id]})); }\n  removeDose(i){ if(this.state.status!=='composing') return; this.setState(s=>({composition:s.composition.filter((_,j)=>j!==i)})); }\n  submit(){\n    if(this.state.composition.length!==5 || this.state.status!=='composing') return;\n    const comp=this.state.composition.slice();\n    const fb=this.evaluate(comp,this.state.puzzle);\n    const board=[...this.state.board,{recipe:comp,fb}];\n    let status='composing';\n    if(fb.win) status='won';\n    else if(board.length>=this.GUESSES) status='lost';\n    this.setState({board, composition:[], status, overlayOpen:status!=='composing'});\n    this.saveDaily(board,status);\n    if(status!=='composing') this.recordStats(status,board.length);\n  }\n  startPlay(){ this.setState({screen:'play'}); }\n  newFree(){\n    const size=this.clampSize(this.props.paletteSize);\n    const rng=this.mulberry32(Math.floor(Math.random()*2147483647));\n    const palette=this.genPalette(rng,size);\n    const r=this.genRecipe(rng,palette);\n    const puzzle={palette,target:r.target,canonical:r.recipe,theme:this.themeFor(palette),num:'∞'};\n    this.setState({puzzle,composition:[],board:[],status:'composing',overlayOpen:false,free:true,screen:'launch',copied:false});\n  }\n  share(text){ try{ navigator.clipboard.writeText(text); this.setState({copied:true}); setTimeout(()=>this.setState({copied:false}),1800); }catch(e){} }\n\n  /* ---------- tokens ---------- */\n  tokens(){\n    const theme=this.props.theme||'darkroom';\n    if(theme==='editorial') return {\n      bg:'#F4F2EC', surface:'#FFFFFF', ink:'#15110C', sub:'#A89F90',\n      borderCss:'1px solid #E4DED2', rad:'0px', shadow:'none', shadowSm:'none',\n      fontDisplay:\"'DM Serif Display', serif\", fontUI:\"'Archivo', sans-serif\", fontMono:\"'Archivo', sans-serif\"\n    };\n    if(theme==='pop') return {\n      bg:'#FFEFD6', surface:'#FFFFFF', ink:'#3A1D6E', sub:'#A98FC9',\n      borderCss:'2.5px solid #3A1D6E', rad:'20px', shadow:'5px 6px 0 #3A1D6E', shadowSm:'3px 3px 0 #3A1D6E',\n      fontDisplay:\"'Fredoka', sans-serif\", fontUI:\"'Fredoka', sans-serif\", fontMono:\"'Space Mono', monospace\"\n    };\n    if(theme==='gallery') return {\n      bg:'#FFFFFF', surface:'#FFFFFF', ink:'#0D0D0D', sub:'#B6B6B6',\n      borderCss:'1px solid #EBEBEB', rad:'0px', shadow:'none', shadowSm:'none',\n      fontDisplay:\"'Archivo', sans-serif\", fontUI:\"'Archivo', sans-serif\", fontMono:\"'Space Mono', monospace\"\n    };\n    return {\n      bg:'#141217', surface:'#201D27', ink:'#F3EEE4', sub:'#8C889A',\n      borderCss:'1px solid #322E3C', rad:'10px', shadow:'0 16px 44px rgba(0,0,0,0.55)', shadowSm:'none',\n      fontDisplay:\"'Bricolage Grotesque', sans-serif\", fontUI:\"'Space Grotesk', sans-serif\", fontMono:\"'Space Mono', monospace\"\n    };\n  }\n  clueStyle(clue,t){\n    if(clue==='green')  return {bg:'#3BA55D', fg:'#FFFFFF', border:t.borderCss};\n    if(clue==='yellow') return {bg:'#E3A82B', fg:'#16130F', border:t.borderCss};\n    if(clue==='grey')   return {bg:'#BDB8AE', fg:'#FFFFFF', border:t.borderCss};\n    return {bg:'transparent', fg:t.sub, border:'1px dashed '+t.sub};\n  }\n\n  renderVals(){\n    const t=this.tokens();\n    const st=this.state, pz=st.puzzle, help=this.help();\n    const showPct = help!=='brutal';\n    const showClues = help!=='hard';\n    const showMix = this.props.showMix===true;\n    const finished = st.status!=='composing';\n    const num = pz.num;\n\n    const hintCss = h => h==='green' ? '#6aaa64' : h==='yellow' ? '#c9b458' : h==='grey' ? '#787c7e' : 'transparent';\n    const iconFor = h => h==='green' ? '✓' : h==='yellow' ? '↕' : '';\n    // aggregate the best-known hint per pigment across all guesses (green/grey are certain; yellow tentative)\n    const pigHint = {}; pz.palette.forEach(id=>{ pigHint[id]='none'; });\n    st.board.forEach(b=>{ pz.palette.forEach(id=>{\n      const c=b.fb.clues[id];\n      if(c==='grey') pigHint[id]='grey';\n      else if(c==='green' && pigHint[id]!=='grey') pigHint[id]='green';\n      else if(c==='yellow' && pigHint[id]==='none') pigHint[id]='yellow';\n    }); });\n\n    const chips = pz.palette.map(id=>{ const p=this.pmap[id]; return {id, name:p.name, code:p.code, css:this.css(this.mix([id,id,id,id,id]))}; });\n\n    const compFull = st.composition.length>=5;\n    const playChips = chips.map((c,i)=>{\n      const disabled = compFull || finished;\n      const h = showClues ? pigHint[c.id] : 'none';\n      const ic = iconFor(h);\n      const excluded = h==='grey';\n      const rgb=this.mix([c.id,c.id,c.id,c.id,c.id]);\n      return Object.assign({}, c, {\n        key: this.KEYS[i] || '',\n        onClick: ()=>this.addDose(c.id),\n        disabled,\n        cursor: disabled?'not-allowed':'pointer',\n        opacity: disabled ? '0.5' : (excluded ? '0.45' : '1'),\n        swatchFilter: excluded ? 'grayscale(1)' : 'none',\n        iconColor: ic ? this.fgFor(rgb) : 'transparent',\n        icon: ic\n      });\n    });\n\n    const compSlots=[];\n    for(let i=0;i<5;i++){\n      if(i<st.composition.length){\n        const id=st.composition[i]; const rgb=this.mix([id,id,id,id,id]);\n        const idx=i;\n        compSlots.push({css:this.css(rgb), code:this.pmap[id].code.split('-')[0], fg:this.fgFor(rgb), cursor:finished?'default':'pointer', border:t.borderCss, onClick:()=>this.removeDose(idx)});\n      } else {\n        compSlots.push({css:'transparent', code:'', fg:t.sub, cursor:'default', border:'1px dashed '+t.sub, onClick:()=>{}});\n      }\n    }\n\n    const liveCss = st.composition.length ? this.css(this.mix(st.composition)) : 'transparent';\n\n    // history rows — show the doses actually mixed, each marked with a hint icon\n    const rows=[];\n    for(let i=0;i<this.GUESSES;i++){\n      if(i<st.board.length){\n        const b=st.board[i];\n        const sorted=b.recipe.slice().sort((x,y)=>pz.palette.indexOf(x)-pz.palette.indexOf(y));\n        const cells=sorted.map(id=>{\n          const rgb=this.mix([id,id,id,id,id]);\n          if(!showClues) return {swatchBg:this.css(rgb), tileBorder:t.borderCss, iconColor:'transparent', icon:''};\n          const clue=b.fb.clues[id]; const ic=iconFor(clue);\n          return {swatchBg:this.css(rgb), tileBorder:t.borderCss, iconColor: ic?this.fgFor(rgb):'transparent', icon:ic};\n        });\n        rows.push({swatchCss:this.css(b.fb.rgb), cells, pctText: showPct? b.fb.matchPercent+'%':'', opacity:'1'});\n      } else {\n        const cells=[0,1,2,3,4].map(()=>({swatchBg:'transparent', tileBorder:'1px dashed '+t.sub, iconColor:'transparent', icon:''}));\n        rows.push({swatchCss:'transparent', cells, pctText:'', opacity:'0.45'});\n      }\n    }\n\n    const best = st.board.length ? Math.max.apply(null, st.board.map(b=>b.fb.matchPercent)) : 0;\n    const gaugeFill = 'hsl('+Math.round(best*1.2)+',62%,46%)';\n\n    // analysis\n    let analysisLines=[]; const showAnalysisPanel = help==='full' && st.board.length>0;\n    if(showAnalysisPanel){\n      const last=st.board[st.board.length-1].fb.rgb;\n      const g=this.oklabToOklch(this.rgbToOklab(last));\n      const tg=this.oklabToOklch(this.rgbToOklab(pz.target));\n      const dL=tg.L-g.L, dC=tg.C-g.C; const dH=((tg.H-g.H+540)%360)-180;\n      analysisLines.push({label:'LIGHTNESS', msg: dL>0.04?'Too dark — lighten':(dL<-0.04?'Too light — deepen':'On target')});\n      analysisLines.push({label:'INTENSITY', msg: dC>0.02?'Too dull — saturate':(dC<-0.02?'Too vivid — knock back':'On target')});\n      analysisLines.push({label:'HUE', msg: Math.abs(dH)>8?('Push toward '+this.hueName(tg.H)):'On target'});\n    }\n\n    // overlay\n    const won=st.status==='won';\n    const canonChips = pz.canonical.map(id=>{ const rgb=this.mix([id,id,id,id,id]); return {css:this.css(rgb), code:this.pmap[id].code.split('-')[0]}; });\n    const cc=this.countMap(pz.canonical);\n    const recipeText = Object.keys(cc).sort((a,b)=>cc[b]-cc[a]).map(id=>cc[id]+'× '+this.pmap[id].name).join('  ·  ');\n    const s=st.stats;\n    const winPct = s.played? Math.round((s.wins||0)/s.played*100):0;\n    const distMax = Math.max(1, ...(s.distribution||[0]));\n    const thisAttempt = won? st.board.length : -1;\n    const distBars = (s.distribution||[0,0,0,0,0,0]).slice(0,this.GUESSES).map((c,i)=>{\n      const isThis = (i+1)===thisAttempt;\n      return {label:String(i+1), count:c, h: Math.round((c/distMax)*60)+'px', bg: isThis? gaugeFill : t.ink, fg: isThis? gaugeFill : t.ink};\n    });\n\n    // share — one row per guess, 5 squares (one per dose), matching the board\n    const shareRows = st.board.map(b=>{\n      const sorted=b.recipe.slice().sort((x,y)=>pz.palette.indexOf(x)-pz.palette.indexOf(y));\n      const r=sorted.map(id=>{ const c=b.fb.clues[id]; return c==='green'?'🟩':(c==='yellow'?'🟨':'⬜'); }).join('');\n      return r + '  ' + b.fb.matchPercent + '%';\n    });\n    const shareText = 'Nuance #'+num+'  '+(won?st.board.length:'X')+'/'+this.GUESSES+'\\n'+shareRows.join('\\n');\n\n    const helpLabels={full:'FULL HELP', standard:'STANDARD', hard:'HARD · % ONLY', brutal:'BRUTAL · CLUES ONLY'};\n\n    const canGuess = st.composition.length===5 && st.status==='composing';\n\n    const curDate = this.currentDate();\n    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    const isToday = st.dayOffset===0;\n    const dateLabel = isToday ? 'TODAY' : (months[curDate.getMonth()]+' '+curDate.getDate());\n    const canGoBack = this.dayNumber(curDate) > 1;\n\n    return {\n      t, num, dateLabel, isToday, canGoBack, finished,\n      prevDisabled: !canGoBack, prevCursor: canGoBack?'pointer':'not-allowed', prevOpacity: canGoBack?'1':'0.35',\n      nextCursor: isToday?'not-allowed':'pointer', nextOpacity: isToday?'0.35':'1',\n      isLaunch: st.screen==='launch', isPlay: st.screen==='play',\n      themeTitle: pz.theme.title, themeSub: pz.theme.sub,\n      chips, playChips, compSlots, liveCss, rows,\n      targetCss: this.css(pz.target),\n      showPct, showClues, showMix, showAnalysisPanel, analysisLines,\n      bestPctText: st.board.length? best+'%':'—', gaugeWidth:(st.board.length?best:0)+'%', gaugeFill,\n      compCount: st.composition.length,\n      guessDisabled: !canGuess, guessCursor: canGuess?'pointer':'not-allowed', guessOpacity: canGuess?'1':'0.4',\n      overlayOpen: st.overlayOpen,\n      resultTitle: won?'SOLVED':'OUT OF GUESSES',\n      resultSub: won? ('Matched in '+st.board.length+'/'+this.GUESSES+(st.free?' · free play':'')) : 'The target recipe is revealed below.',\n      canonChips, recipeText,\n      statPlayed: s.played||0, statWinPct: winPct, statStreak: s.currentStreak||0, statMax: s.maxStreak||0,\n      distBars, shareText, shareLabel: st.copied?'COPIED ✓':'SHARE RESULT',\n      onPlay: ()=>this.startPlay(),\n      onGuess: ()=>this.submit(),\n      onPrevDay: ()=>this.goToDay(1),\n      onNextDay: ()=>this.goToDay(-1),\n      onReopen: ()=>this.setState({overlayOpen:true}),\n      onClose: ()=>this.setState({overlayOpen:false}),\n      onShare: ()=>this.share(shareText)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
