<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>*{box-sizing:border-box;} body{margin:0;}</style>
</helmet>
<div style="min-height:100vh; background:#2A2730; display:flex; align-items:center; justify-content:center; padding:32px; font-family:'Space Grotesk',sans-serif;">
  <div style="position:relative; width:402px; height:844px; background:#000; border-radius:52px; padding:11px; box-shadow:0 40px 90px rgba(0,0,0,0.5), 0 0 0 2px #3a3a3a;">
    <div style="position:absolute; top:22px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; z-index:10;"></div>
    <div style="width:100%; height:100%; border-radius:42px; overflow:hidden; background:#141217;">
      <div style="height:100%; overflow:auto; padding-top:44px;">
        <dc-import name="Nuance" theme="darkroom" palette-size="25" hint-size="380px,1200px"></dc-import>
      </div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
